{{define "status_badge"}}
{{- $color := statusColor . -}}
{{- if eq $color "green" -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-emerald-400">
  <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-sm shadow-emerald-400/50"></span>{{.}}
</span>
{{- else if eq $color "yellow" -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-amber-400">
  <span class="w-2 h-2 rounded-full bg-amber-400 shadow-sm shadow-amber-400/50 animate-glow-pulse"></span>{{.}}
</span>
{{- else if eq $color "orange" -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-orange-400">
  <span class="w-2 h-2 rounded-full bg-orange-400 shadow-sm shadow-orange-400/50 animate-glow-pulse"></span>{{.}}
</span>
{{- else if eq $color "blue" -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-blue-400">
  <span class="w-2 h-2 rounded-full bg-blue-400 shadow-sm shadow-blue-400/50 animate-glow-pulse"></span>{{.}}
</span>
{{- else if eq $color "red" -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-red-400">
  <span class="w-2 h-2 rounded-full bg-red-400 shadow-sm shadow-red-400/50"></span>{{.}}
</span>
{{- else -}}
<span class="inline-flex items-center gap-1.5 text-xs font-medium text-surface-400">
  <span class="w-2 h-2 rounded-full bg-surface-500"></span>{{.}}
</span>
{{- end -}}
{{end}}
