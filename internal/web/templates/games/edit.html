{{define "title"}}Edit {{.Game.Name}} - Gamejanitor{{end}}

{{define "content"}}
<div class="max-w-4xl mx-auto px-4 sm:px-6 py-6" x-data="editGame()">
  <div class="mb-6">
    <a href="/games/{{.Game.ID}}" class="inline-flex items-center gap-1 text-xs text-surface-400 hover:text-white transition-colors">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back to {{.Game.Name}}
    </a>
    <h1 class="font-display font-bold text-2xl text-white mt-2">Edit Game</h1>
  </div>

  <form hx-put="/games/{{.Game.ID}}" hx-target="#content">
    <div class="space-y-5">
      <!-- Basic Info -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-surface-300 mb-1.5">Game ID</label>
          <input type="text" value="{{.Game.ID}}" disabled
                 class="w-full rounded-lg bg-surface-900/40 border border-surface-800 px-3 py-2.5 text-surface-400 cursor-not-allowed">
          <p class="text-xs text-surface-500 mt-1">Game ID cannot be changed</p>
        </div>
        <div>
          <label for="name" class="block text-sm font-medium text-surface-300 mb-1.5">Display Name</label>
          <input type="text" name="name" id="name" required value="{{.Game.Name}}"
                 class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2.5 text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors">
        </div>
      </div>

      <div>
        <label for="image" class="block text-sm font-medium text-surface-300 mb-1.5">Docker Image</label>
        <input type="text" name="image" id="image" required value="{{.Game.Image}}"
               class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2.5 text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors font-mono text-sm">
      </div>

      <!-- Image Paths -->
      <div x-data="{ showImages: false }">
        <button type="button" @click="showImages = !showImages"
                class="flex items-center gap-2 text-sm text-surface-400 hover:text-white transition-colors">
          <svg :class="showImages && 'rotate-180'" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          Image Paths
        </button>
        <div x-show="showImages" x-cloak x-transition class="mt-3 space-y-3">
          <div>
            <label for="icon_path" class="block text-xs font-medium text-surface-400 mb-1">Icon Path</label>
            <input type="text" name="icon_path" id="icon_path" value="{{.Game.IconPath}}"
                   class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors">
          </div>
          <div>
            <label for="grid_path" class="block text-xs font-medium text-surface-400 mb-1">Grid Image Path</label>
            <input type="text" name="grid_path" id="grid_path" value="{{.Game.GridPath}}"
                   class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors">
          </div>
          <div>
            <label for="hero_path" class="block text-xs font-medium text-surface-400 mb-1">Hero Image Path</label>
            <input type="text" name="hero_path" id="hero_path" value="{{.Game.HeroPath}}"
                   class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors">
          </div>
        </div>
      </div>

      <!-- Resources -->
      <div>
        <label for="recommended_memory_mb" class="block text-sm font-medium text-surface-300 mb-1.5">Recommended Memory (MB)</label>
        <input type="number" name="recommended_memory_mb" id="recommended_memory_mb" min="0" value="{{.Game.RecommendedMemoryMB}}"
               class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2.5 text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors">
      </div>

      <!-- Advanced Settings -->
      <div x-data="{ showAdvanced: false }">
        <button type="button" @click="showAdvanced = !showAdvanced"
                class="flex items-center gap-2 text-sm text-surface-400 hover:text-white transition-colors">
          <svg :class="showAdvanced && 'rotate-180'" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          Advanced Settings
        </button>

        <div x-show="showAdvanced" x-cloak x-transition class="mt-4 space-y-5 p-4 rounded-xl bg-surface-900/40 border border-surface-800/60">
          <div>
            <label for="gsq_game_slug" class="block text-sm font-medium text-surface-300 mb-1.5">GameServerQuery Slug</label>
            <input type="text" name="gsq_game_slug" id="gsq_game_slug" value="{{if .Game.GSQGameSlug}}{{deref .Game.GSQGameSlug}}{{end}}"
                   class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2.5 text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors"
                   placeholder="Optional — for server query support">
          </div>

          <!-- Default Ports -->
          <div>
            <label class="block text-sm font-medium text-surface-300 mb-2">Default Ports</label>
            <template x-for="(port, idx) in defaultPorts" :key="idx">
              <div class="flex gap-2 mb-2">
                <input type="text" x-model="port.name" placeholder="Name"
                       class="w-1/4 rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500">
                <input type="number" x-model="port.port" placeholder="Port"
                       class="w-1/4 rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500">
                <select x-model="port.protocol"
                        class="w-1/4 rounded-lg bg-surface-900/80 border border-surface-700 px-2 py-2 text-sm text-white focus:border-accent-500 focus:ring-1 focus:ring-accent-500">
                  <option value="tcp">TCP</option>
                  <option value="udp">UDP</option>
                </select>
                <button type="button" @click="defaultPorts.splice(idx, 1)" class="px-2 text-red-400 hover:text-red-300">&times;</button>
              </div>
            </template>
            <button type="button" @click="defaultPorts.push({name:'', port:'', protocol:'tcp'})"
                    class="text-xs text-accent-400 hover:text-accent-300">+ Add port</button>
          </div>

          <!-- Default Environment -->
          <div>
            <label class="block text-sm font-medium text-surface-300 mb-2">Default Environment Variables</label>
            <template x-for="(env, idx) in defaultEnv" :key="idx">
              <div class="flex gap-2 mb-2">
                <input type="text" x-model="env.key" placeholder="Key"
                       class="w-1/3 rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500">
                <input type="text" x-model="env.default" placeholder="Default Value"
                       class="w-1/3 rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2 text-sm text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500">
                <label class="flex items-center gap-1 text-xs text-surface-400">
                  <input type="checkbox" x-model="env.system" class="w-3 h-3 rounded bg-surface-900 border-surface-600 text-accent-500">
                  System
                </label>
                <button type="button" @click="defaultEnv.splice(idx, 1)" class="px-2 text-red-400 hover:text-red-300">&times;</button>
              </div>
            </template>
            <button type="button" @click="defaultEnv.push({key:'', default:'', system:false})"
                    class="text-xs text-accent-400 hover:text-accent-300">+ Add variable</button>
          </div>

          <!-- Disabled Capabilities -->
          <div>
            <label for="disabled_caps_input" class="block text-sm font-medium text-surface-300 mb-1.5">Disabled Capabilities</label>
            <input type="text" id="disabled_caps_input" x-model="disabledCapsInput"
                   class="w-full rounded-lg bg-surface-900/80 border border-surface-700 px-3 py-2.5 text-white placeholder-surface-500 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors"
                   placeholder="Comma-separated: restart, update-game, reinstall">
          </div>
        </div>
      </div>

      <!-- Hidden JSON fields -->
      <input type="hidden" name="default_ports_json" :value="JSON.stringify(defaultPorts)">
      <input type="hidden" name="default_env_json" :value="JSON.stringify(defaultEnv)">
      <input type="hidden" name="disabled_capabilities_json" :value="JSON.stringify(disabledCapsInput ? disabledCapsInput.split(',').map(s => s.trim()).filter(Boolean) : [])">

      <!-- Submit -->
      <div class="pt-2">
        <button type="submit"
                class="w-full sm:w-auto px-8 py-3 rounded-xl bg-accent-600 hover:bg-accent-500 text-white font-display font-semibold transition-colors shadow-lg shadow-accent-600/20">
          Save Changes
        </button>
      </div>
    </div>
  </form>
</div>

<script>
function editGame() {
  const portsRaw = {{rawJS .DefaultPortsJSON}};
  const envRaw = {{rawJS .DefaultEnvJSON}};
  const capsRaw = {{rawJS .DisabledCapsJSON}};

  let defaultPorts = [];
  try {
    if (Array.isArray(portsRaw)) {
      defaultPorts = portsRaw.map(p => ({
        name: p.name || '',
        port: p.port || '',
        protocol: p.protocol || 'tcp'
      }));
    }
  } catch(e) {}

  let defaultEnv = [];
  try {
    if (Array.isArray(envRaw)) {
      defaultEnv = envRaw.map(e => ({
        key: e.key || '',
        default: e.default || '',
        system: e.system || false
      }));
    }
  } catch(e) {}

  let disabledCapsInput = '';
  try {
    if (Array.isArray(capsRaw)) {
      disabledCapsInput = capsRaw.join(', ');
    }
  } catch(e) {}

  return { defaultPorts, defaultEnv, disabledCapsInput };
}
</script>
{{end}}
